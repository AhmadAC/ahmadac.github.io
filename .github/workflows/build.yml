name: Build Desktop Executables

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # This matrix runs the job in parallel on the specified Operating Systems.
        # macOS is commented out due to Apple Gatekeeper/Signing restrictions on unsigned executables.
        # os: [ubuntu-latest, macos-latest, windows-latest]
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: MrCooperServer-Linux
          # - os: macos-latest
          #   artifact_name: MrCooperServer-MacOS
          - os: windows-latest
            artifact_name: MrCooperServer-Windows

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Use standard recent python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Automatically install any dependencies required by server.py if a requirements.txt is present
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Build Executable with PyInstaller
        run: |
          # --onedir packs everything into a directory containing the executable and its dependencies
          # We purposefully omit --noconsole so you can see the terminal output (e.g., "Server running on port 8000") and easily close it.
          pyinstaller --onedir --name "MrCooperServer" server.py
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          # Upload the specific directory created by PyInstaller
          path: dist/MrCooperServer/
          # Retains the uploaded executables in the GitHub Actions tab for 14 days
          retention-days: 14