<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Quiz Player</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<!-- This container will hold 1, 2, or 3 quiz instances -->
<div id="master-container"></div>

<!-- The button to control the view mode -->
<button id="view-mode-btn">Split</button>

<!-- The entire structure of a single quiz app is now a template -->
<template id="quiz-instance-template">
    <div class="app-instance-container">
        <!-- View 1: Class Selection -->
        <div class="view-class-select view active">
            <h1 class="view-title">Select Your Class</h1>
            <div class="class-grid">
                <!-- Populated by JS -->
            </div>
            <div class="center-btn">
                <button class="btn-view-results btn-dark">View All Results</button>
            </div>
        </div>

        <!-- View 2: Assignment Selection -->
        <div class="view-assignments view">
            <div class="header-row">
                <h2 class="assignments-title">Assignments</h2>
            </div>
            <div class="scroll-area">
                <div class="assignment-list list-container">
                    <!-- Populated by JS -->
                </div>
            </div>
            <div class="footer-row">
                <button class="btn-nav btn-back-to-class">← Back</button>
            </div>
        </div>

        <!-- View 3: Quiz Player -->
        <div class="view-quiz view">
            <div class="quiz-header">
                <h2 class="quiz-title-lbl">Quiz Title</h2>
                <span class="quiz-progress-lbl">0/0</span>
            </div>
            
            <div class="sticky-word-bank sticky-bank hidden">
                <!-- Populated by JS dynamically -->
            </div>

            <div class="scroll-area quiz-scroll-area">
                <div class="quiz-content quiz-content-layout">
                    <!-- Questions injected here -->
                </div>
            </div>
            
            <div class="quiz-result-box hidden">
                <p class="quiz-result-text"></p>
            </div>

            <div class="footer-row">
                <button class="btn-nav btn-back-to-assignments">← Back</button>
                <span class="quiz-error-msg error-msg"></span>
                <div class="flex-spacer"></div>
                <button class="btn-submit-quiz btn-primary">Submit Quiz</button>
                <button class="btn-save-picture btn-tertiary hidden">Save Picture</button>
                <button class="btn-redo-quiz btn-secondary hidden">Retake Quiz</button>
            </div>
        </div>

        <!-- View 4: Results -->
        <div class="view-results view">
            <div class="header-row">
                <button class="btn-nav btn-back-to-class-from-results">← Menu</button>
                <h2 style="margin-left: 10px;">Results</h2>
            </div>
            <div class="scroll-area">
                <div class="results-list list-container">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>
</template>

<script src="app.js"></script>
</body>
</html>
