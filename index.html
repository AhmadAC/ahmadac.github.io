<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mr. Cooper's Quiz Suite</title>
    
    <!-- Refactored Stylesheet System -->
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="components.css">
    
    <!-- Confetti Library for 100% scores -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <!-- Theme Toggle Toggle Switch -->
    <button id="theme-toggle-btn" aria-label="Toggle Theme">
        <!-- Sun Icon -->
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon Icon -->
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <button id="view-mode-btn">Toggle Screens</button>

    <!-- Main container where 1, 2, or 3 quiz instances will be injected -->
    <div id="master-container"></div>

    <!-- This template is cloned by app.js to create the UI -->
    <template id="quiz-instance-template">
        <div class="app-instance-container">
            
            <!-- VIEW 1: Class Selection -->
            <div class="view view-class-select active">
                <div class="view-title">Select Your Class</div>
                <div class="class-grid">
                    <!-- Buttons generated by app.js -->
                </div>
                <div class="center-btn">
                    <button class="btn-primary btn-view-resources" style="font-size: 16px; padding: 12px 30px; border-radius: 6px;">Class Resources</button>
                    <button class="btn-dark btn-view-results hidden">View All Results</button>
                    <button class="btn-dark btn-view-bonus hidden">Bonus</button>
                </div>
            </div>

            <!-- VIEW 2: Assignment List -->
            <div class="view view-assignments">
                <div class="header-row">
                    <button class="btn-nav btn-back-to-class">← Back</button>
                    <div class="flex-spacer"></div>
                    <div class="assignments-header-center">
                        <h2 class="assignments-title">Assignments</h2>
                        <div class="current-week-lbl">Current Week: Loading...</div>
                    </div>
                    <div class="flex-spacer"></div>
                </div>
                <div class="scroll-area">
                    <div class="assignment-list list-container">
                        <!-- List generated by app.js -->
                    </div>
                </div>
            </div>

            <!-- VIEW 3: The Quiz Interface -->
            <div class="view view-quiz">
                <div class="quiz-header">
                    <button class="btn-nav btn-back-to-assignments">← Back</button>
                    <h2 class="quiz-title-lbl">Quiz Name</h2>
                    <span class="quiz-progress-lbl">0/0</span>
                </div>

                <div class="quiz-middle-container">
                    <div class="quiz-main-content">
                        <!-- Sticky Word Bank for Matching Questions -->
                        <div class="sticky-word-bank hidden"></div>

                        <div class="scroll-area quiz-scroll-area">
                            <div class="quiz-content">
                                <!-- Info Section Top Element -->
                                <div class="quiz-info-section hidden">
                                    <div class="info-content"></div>
                                </div>
                                <!-- Questions generated by app.js -->
                            </div>

                            <!-- Result feedback box (shown after submission) -->
                            <div class="quiz-result-box hidden">
                                <p class="quiz-result-text"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Sidebar Navigation -->
                    <div class="quiz-sidebar">
                        <div class="sidebar-list">
                            <!-- Q buttons generated by app.js -->
                        </div>
                    </div>
                </div>

                <!-- Quiz Footer with Controls (Optimized Single-Row Layout) -->
                <div class="footer-row">
                    <div class="footer-left-group">
                        <button class="btn-secondary btn-back-to-assignments">Back</button>
                        <button class="btn-jump btn-jump-top hidden">Q1</button>
                    </div>
                    
                    <div class="quiz-error-msg"></div>
                    
                    <div class="footer-right-group">
                        <button class="btn-jump btn-jump-bottom hidden">END</button>
                        <button class="btn-primary btn-submit-quiz">Submit Quiz</button>
                        <button class="btn-primary btn-redo-quiz hidden">Retake Quiz</button>
                        <button class="btn-primary btn-save-picture hidden">Save Picture</button>
                    </div>
                </div>
            </div>

            <!-- VIEW 4: Results History -->
            <div class="view view-results">
                <div class="header-row">
                    <button class="btn-nav btn-back-to-class-from-results">← Menu</button>
                    <div class="flex-spacer"></div>
                    <h2>Results</h2>
                    <div class="flex-spacer"></div>
                </div>
                <div class="scroll-area">
                    <div class="results-list list-container">
                        <!-- Results generated by app.js -->
                    </div>
                </div>
            </div>

            <!-- VIEW 5: Document / Homework Page (No Quiz elements) -->
            <div class="view view-document">
                <div class="quiz-header document-header">
                    <button class="btn-nav btn-back-from-document">← Back</button>
                    <h2 class="document-title-lbl">Document Name</h2>
                    <div style="min-width: 50px;"></div> <!-- visual spacer to balance the back button -->
                </div>
                <div class="scroll-area document-scroll-area">
                    <div class="document-content">
                        <!-- Iframe safely injected by app.js goes here -->
                    </div>
                </div>
            </div>

        </div>
    </template>

    <!-- LOAD THE ENTRY POINT AS A MODULE -->
    <script type="module" src="app.js"></script>
</body>
</html>
